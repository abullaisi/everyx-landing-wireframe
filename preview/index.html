<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EveryX Preview Dashboard</title>
  <style>
    :root {
      --bg: #0f1118;
      --card: #161a23;
      --text: #eaf0ff;
      --muted: #9ca8c8;
      --accent: #8b5cf6;
      --accent2: #f97316;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 0%, #1d2340, transparent 45%), var(--bg);
    }
    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    p { margin: 0; color: var(--muted); }
    .grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .card {
      background: var(--card);
      border: 1px solid #2a3040;
      border-radius: 14px;
      padding: 14px;
      cursor: pointer;
      transition: transform .15s ease, border-color .2s ease;
    }
    .card:hover { transform: translateY(-1px); border-color: #536088; }
    .card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
    .card h2 { margin: 0 0 6px; font-size: 16px; }
    .meta { font-size: 13px; color: var(--muted); }
    .actions { margin-top: 8px; display: flex; gap: 8px; }
    .actions a {
      text-decoration: none;
      color: white;
      font-size: 12px;
      border-radius: 999px;
      padding: 6px 10px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .preview {
      margin-top: 16px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #2a3040;
      background: #0b0d14;
      height: calc(100vh - 280px);
      min-height: 560px;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }
    @media (max-width: 960px) {
      .grid { grid-template-columns: 1fr; }
      .preview { height: 70vh; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>EveryX Landing Variants Preview</h1>
    <p>Review wireframe backup plus two redesigned variants before Cloudflare/GitHub deployment.</p>

    <div class="grid" id="cards">
      <div class="card active" data-src="../wireframe/index.html">
        <h2>Wireframe Backup</h2>
        <div class="meta">Path: <code>/wireframe</code></div>
        <div class="actions"><a href="../wireframe/index.html" target="_blank" rel="noopener">Open</a></div>
      </div>
      <div class="card" data-src="../variant-a/index.html">
        <h2>Variant A (Scalar)</h2>
        <div class="meta">Path: <code>/variant-a</code></div>
        <div class="actions"><a href="../variant-a/index.html" target="_blank" rel="noopener">Open</a></div>
      </div>
      <div class="card" data-src="../variant-b/index.html">
        <h2>Variant B (Plasma)</h2>
        <div class="meta">Path: <code>/variant-b</code></div>
        <div class="actions"><a href="../variant-b/index.html" target="_blank" rel="noopener">Open</a></div>
      </div>
    </div>

    <div class="preview">
      <iframe id="stage" src="../wireframe/index.html" title="EveryX Preview"></iframe>
    </div>
  </div>

  <script>
    (function () {
      var cards = Array.from(document.querySelectorAll('.card'));
      var frame = document.getElementById('stage');
      cards.forEach(function (card) {
        card.addEventListener('click', function (event) {
          if (event.target.closest('a')) return;
          cards.forEach(function (c) { c.classList.remove('active'); });
          card.classList.add('active');
          frame.src = card.getAttribute('data-src');
        });
      });
    })();
  </script>
</body>
</html>
